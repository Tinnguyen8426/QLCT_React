server {
    listen 3000;
    server_name localhost;

    # Serve static React UI
    root /usr/share/nginx/html;
    index index.html;

    # Fallback to index.html for React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse proxy API calls to .NET backend container
    location /api/ {
        proxy_pass http://backend:5289/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy request for MVC Admin UI and Static files of Backend (if any)
    location /Admin {
        proxy_pass http://backend:5289/Admin;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
